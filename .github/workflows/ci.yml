name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc -b
      - name: Test (with coverage)
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Prettier
        run: npx prettier --check .

  video:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: video/package-lock.json
      - run: npm ci
      - name: Build (typecheck)
        run: npm run build

  actions-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color
      - name: zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: pipx run zizmor==1.27.0 .github/workflows
